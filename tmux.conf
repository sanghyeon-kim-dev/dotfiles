# Prefix: Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Clipboard: pipe tmux copy buffer to macOS clipboard
set -s copy-command "pbcopy"

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Scrollback buffer
set -g history-limit 10000

# Reduce escape delay (important for nvim)
set -sg escape-time 10

# Focus events (needed for nvim autoread)
set -g focus-events on

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# One Dark theme
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left "#[bg=#98c379,fg=#282c34,bold] #S #[bg=#282c34] "
set -g status-right "#[fg=#565c64]%H:%M "
set -g status-left-length 30
set -g window-status-format "#[fg=#565c64] #I:#W "
set -g window-status-current-format "#[fg=#61afef,bold] #I:#W "
set -g pane-border-style "fg=#3e4452"
set -g pane-active-border-style "fg=#61afef"
set -g message-style "bg=#282c34,fg=#abb2bf"
